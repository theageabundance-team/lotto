<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerLotto AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1b33;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 1.5rem;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
    }

    .logo-power {
      color: #ffffff;
      display: block;
    }

    .logo-lott {
      color: #ffffff;
    }

    .logo-ai {
      color: #e63030;
    }

    .check-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 1.2rem;
    }

    .check-icon svg {
      width: 60px;
      height: 60px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      font-size: 15px;
      color: #222222;
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    .subtitle .highlight {
      color: #e63030;
      font-weight: 700;
    }

    .try-line {
      font-size: 14px;
      color: #444444;
      margin-bottom: 1.4rem;
    }

    .how-box {
      background: #f4f4f4;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .how-title {
      font-size: 14px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 0.6rem;
    }

    .how-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .how-list li {
      font-size: 13px;
      color: #333333;
      padding: 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .how-list li::before {
      content: "•";
      color: #333333;
      flex-shrink: 0;
    }

    .btn-start {
      display: block;
      width: 100%;
      padding: 18px 0;
      background: #e63030;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .btn-start:hover {
      background: #c82828;
    }

    .btn-start:active {
      background: #aa2020;
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">
        <span class="logo-power">POWER</span>
        <span class="logo-lott">LOTT</span><span class="logo-ai">AI</span>
      </div>
    </div>

    <div class="check-icon">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="#22c55e" stroke-width="3.5" fill="none"/>
        <polyline points="17,31 26,40 44,22" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Congratulations!</h1>

    <p class="subtitle">
      Find out how to <span class="highlight">match 4 or even 5 numbers</span> using POWERLOTTO AI!
    </p>

    <p class="try-line">Try the simulator for free now 👇</p>

    <div class="how-box">
      <p class="how-title">How it works:</p>
      <ul class="how-list">
        <li>2 games without artificial intelligence</li>
        <li>2 games with POWERLOTTO AI activated</li>
        <li>Test your luck and check your results</li>
      </ul>
    </div>

    <button class="btn-start" onclick="location.href='simulator.html'">START</button>
  </div>
</body>
</html>
