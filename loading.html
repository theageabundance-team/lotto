<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerLotto AI – Analyzing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1b33;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    /* LOGO */
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 1.8rem;
    }
    .logo-text { font-size: 18px; font-weight: 900; line-height: 1.1; text-align: center; }
    .logo-power { color: #fff; display: block; }
    .logo-lott  { color: #fff; }
    .logo-ai    { color: #e63030; }

    /* TITLE */
    .analyze-title {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      line-height: 1.4;
      margin-bottom: 1.6rem;
    }

    /* PROGRESS BAR */
    .bar-wrap {
      width: 100%;
      height: 12px;
      background: #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: #e63030;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    .pct-label {
      font-size: 18px;
      font-weight: 700;
      color: #e63030;
      margin-bottom: 1.8rem;
    }

    /* STEPS */
    .steps { display: flex; flex-direction: column; gap: 10px; }

    .step {
      font-size: 14px;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: color 0.4s;
    }
    .step.active { color: #333; font-weight: 600; }
    .step.done   { color: #aaa; }

    .step-icon { font-size: 16px; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-text">
      <span class="logo-power">POWER</span>
      <span class="logo-lott">LOTT</span><span class="logo-ai">AI</span>
    </div>
  </div>

  <p class="analyze-title">PowerLotto AI is analyzing your profile...</p>

  <div class="bar-wrap">
    <div class="bar-fill" id="bar-fill"></div>
  </div>
  <p class="pct-label" id="pct-label">0%</p>

  <div class="steps">
    <div class="step" id="step-0"><span class="step-icon">⏳</span> Analyzing your answers...</div>
    <div class="step" id="step-1"><span class="step-icon">⏳</span> Calculating your winning potential...</div>
    <div class="step" id="step-2"><span class="step-icon">⏳</span> Matching patterns with high-performance data...</div>
    <div class="step" id="step-3"><span class="step-icon">⏳</span> Preparing your PowerLotto AI test plays...</div>
  </div>

</div>

<script>
  const DURATION = 15000; // 15 seconds
  const bar   = document.getElementById('bar-fill');
  const label = document.getElementById('pct-label');
  const steps = [
    document.getElementById('step-0'),
    document.getElementById('step-1'),
    document.getElementById('step-2'),
    document.getElementById('step-3'),
  ];

  // Step activation thresholds (%)
  const thresholds = [0, 30, 60, 85];

  let start = null;

  function animate(ts) {
    if (!start) start = ts;
    const elapsed = ts - start;
    const pct = Math.min(100, Math.round((elapsed / DURATION) * 100));

    bar.style.width = pct + '%';
    label.textContent = pct + '%';

    // Activate steps
    thresholds.forEach((t, i) => {
      if (pct >= t) {
        steps[i].classList.add('active');
      }
    });

    if (pct < 100) {
      requestAnimationFrame(animate);
    } else {
      // Done — redirect
      setTimeout(() => { location.href = 'ai-simulator.html'; }, 300);
    }
  }

  requestAnimationFrame(animate);
</script>
</body>
</html>
