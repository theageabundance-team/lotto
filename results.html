<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerLotto AI – Results</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1b33; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 2.8rem 2rem 2.2rem;
      max-width: 420px; width: 100%; text-align: center;
    }

    /* LOGO */
    .logo {
      display: inline-flex; align-items: center; justify-content: center;
      background: #1a1a2e; border-radius: 8px; padding: 8px 14px; margin-bottom: 1.8rem;
    }
    .logo-text { font-size: 18px; font-weight: 900; line-height: 1.1; text-align: center; }
    .logo-power { color: #fff; display: block; }
    .logo-lott  { color: #fff; }
    .logo-ai    { color: #e63030; }

    /* TITLE */
    h1 {
      font-size: 26px; font-weight: 900; color: #111;
      font-style: italic; margin-bottom: 0.8rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 1.6rem;
    }

    /* PRIZE BOX */
    .prize-box {
      background: #f0f0f0; border-radius: 12px;
      padding: 1.4rem 1.2rem; margin-bottom: 1.4rem;
    }
    .prize-label {
      font-size: 14px; color: #555; margin-bottom: 0.5rem;
    }
    .prize-amount {
      font-size: 42px; font-weight: 900; color: #e63030;
      letter-spacing: -1px; line-height: 1.1;
      font-variant-numeric: tabular-nums;
      transition: none;
    }
    .prize-rounds {
      font-size: 14px; color: #666; margin-top: 0.4rem;
    }

    /* CTA LINE */
    .cta-line {
      font-size: 15px; font-weight: 700; color: #e63030;
      margin-bottom: 1.6rem; line-height: 1.5;
    }

    /* BUTTON */
    .btn-continue {
      display: block; width: 100%; padding: 18px 0;
      background: #e63030; color: #fff;
      font-size: 16px; font-weight: 800; letter-spacing: 1px;
      border: none; border-radius: 10px; cursor: pointer;
      text-transform: uppercase; transition: background 0.2s;
    }
    .btn-continue:hover { background: #c82828; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-text">
      <span class="logo-power">POWER</span>
      <span class="logo-lott">LOTT</span><span class="logo-ai">AI</span>
    </div>
  </div>

  <h1>You were amazing!</h1>

  <p class="subtitle">
    You saw how with the help of artificial intelligence your results were much better?
  </p>

  <div class="prize-box">
    <p class="prize-label">With our AI, you won:</p>
    <p class="prize-amount" id="counter">$0.00</p>
    <p class="prize-rounds">in just 2 rounds!</p>
  </div>

  <p class="cta-line">Imagine playing every week with the help of our AI?</p>

  <button class="btn-continue" id="btn-continue" onclick="location.href='offer.html'">CONTINUE</button>

</div>

<script>
  // Read balance passed via sessionStorage (set by ai-simulator), fallback to 50100
  const raw    = sessionStorage.getItem('pl_balance');
  const TARGET = raw ? parseFloat(raw) : 50100;

  const el       = document.getElementById('counter');
  const DURATION = 2800; // ms to count up
  const FPS      = 60;
  const STEPS    = Math.round(DURATION / (1000 / FPS));
  let   step     = 0;

  // Easing: ease-out cubic
  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function formatUSD(val) {
    return '$' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function tick() {
    step++;
    const progress = easeOut(step / STEPS);
    const current  = progress * TARGET;
    el.textContent = formatUSD(current);
    if (step < STEPS) {
      requestAnimationFrame(tick);
    } else {
      el.textContent = formatUSD(TARGET);
    }
  }

  // Start after short delay for effect
  setTimeout(() => requestAnimationFrame(tick), 400);
</script>
</body>
</html>
